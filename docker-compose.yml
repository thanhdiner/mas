version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mas-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: mas-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mas-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data

  # Celery worker for distributed task execution
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mas-celery-worker
    command: celery -A app.worker.celery_app worker --loglevel=info --pool=solo -c 4
    env_file:
      - ./backend/.env
    environment:
      - USE_CELERY=true
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mas-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
  chroma_data:
